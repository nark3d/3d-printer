########################################
# TMC5160 configuration
########################################

[tmc5160 stepper_x]
cs_pin: PC4  # Adjust according to your board's pinout
spi_software_mosi_pin = PA7
spi_software_miso_pin = PA6
spi_software_sclk_pin = PA5
run_current: 2.24
# hold_current: 0.5
# microsteps: 16
interpolate: True
# diag1_pin: !PG6  # If using a diag pin, adjust according to your board's pinout
driver_SGT: -64  # -64 is most sensitive value, 63 is least sensitive
# driver_SF: True  # Enable if you want to use StallGuard or sensorless homing
sense_resistor: 0.075

[tmc5160 stepper_y]
cs_pin: PD11  # Adjust according to your board's pinout
spi_software_mosi_pin = PA7
spi_software_miso_pin = PA6
spi_software_sclk_pin = PA5
run_current: 2.24
# hold_current: 0.5
# microsteps: 16
interpolate: True
# diag1_pin: ^!PG9 # use the same pin that was previously the endstop_pin! 
diag0_pin: !PG9  # If using a diag pin, adjust according to your board's pinout
# driver_SF: True  # Enable if you want to use StallGuard or sensorless homing
sense_resistor: 0.075

