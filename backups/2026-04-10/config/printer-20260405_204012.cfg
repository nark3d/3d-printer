[heater_bed]
heater_pin: PA1
sensor_pin: PF3 # TB
sensor_type: Generic 3950
min_temp: 0
max_temp: 130

# ============================================================
# HOTBOX Config
# ============================================================
 
[heater_generic chamber]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF6
min_temp: 0
max_temp: 70
control: pid
pwm_cycle_time: 0.01
pid_Kp: 100
pid_Ki: 0.3
pid_Kd: 30
 
[verify_heater chamber]
max_error: 600
check_gain_time: 300
hysteresis: 5
heating_gain: 0.5
 
[temperature_fan hotbox]
pin: PD14
sensor_type: Generic 3950
sensor_pin: PF7
min_temp: 0
max_temp: 120
target_temp: 30.0
min_speed: 0.0
max_speed: 1.0
control: watermark
max_delta: 1
kick_start_time: 0.5
 
# ============================================================
# HOTBOX CONTROL LOOP
# ============================================================
[delayed_gcode HOTBOX_CONTROL]
initial_duration: 5
gcode:
    {% set hotbox_temp = printer['temperature_fan hotbox'].temperature %}
    {% set chamber_target = printer['heater_generic chamber'].target %}
    {% set heater_on = chamber_target > 0 %}
    {% if heater_on %}
        SET_GCODE_VARIABLE MACRO=HOTBOX_STATE VARIABLE=target VALUE={chamber_target}
    {% endif %}
    {% if hotbox_temp > 87 and heater_on %}
        SET_HEATER_TEMPERATURE HEATER=chamber TARGET=0
        UPDATE_DELAYED_GCODE ID=HOTBOX_BACKOFF DURATION=60
        RESPOND MSG="HotBox: Element at {hotbox_temp}C - 60s backoff, will restart automatically"
    {% endif %}
    UPDATE_DELAYED_GCODE ID=HOTBOX_CONTROL DURATION=5
 
[delayed_gcode HOTBOX_BACKOFF]
initial_duration: 0
gcode:
    HOTBOX_RESTART
    
[temperature_sensor Octopus_pro]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor chamber_bottom]
sensor_type: Generic 3950
sensor_pin: PF5
min_temp: 0
max_temp: 300

# COMMENTED OUT - part cooling fan now on EBB42
#[fan]
#pin: PA8

# COMMENTED OUT - heater fan now on EBB42
#[heater_fan heatbreak_cooling_fan]
#pin: PE5

[output_pin enclosure_fans]
pin: PD12
pwm: True

[delayed_gcode ENCLOSURE_FAN_CONTROL]
initial_duration: 10
gcode:
    {% set pi_temp = printer['temperature_sensor raspberry_pi'].temperature %}
    {% set mcu_temp = printer['temperature_sensor Octopus_pro'].temperature %}
    {% if pi_temp > 45 or mcu_temp > 45 %}
        SET_PIN PIN=enclosure_fans VALUE=1.0
    {% else %}
        SET_PIN PIN=enclosure_fans VALUE=0.0
    {% endif %}
    UPDATE_DELAYED_GCODE ID=ENCLOSURE_FAN_CONTROL DURATION=10
    
[output_pin bentobox]
pin: PD13
pwm: True

[output_pin main_lights]
pin: PD15
pwm: True
cycle_time: 0.001
value: 1

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f429xx_27001B001250304738313820-if00

[mcu EBB36]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_EBB36_GEN-if00

[include ebb_gen2.cfg]

[printer]
kinematics: corexy
max_velocity: 600
max_accel: 20000
max_z_velocity: 5
max_z_accel: 50

########################################
# TMC5160 configuration
########################################

[tmc5160 stepper_x]
cs_pin: PC4
spi_software_mosi_pin = PA7
spi_software_miso_pin = PA6
spi_software_sclk_pin = PA5
run_current: 2.24
interpolate: True
driver_SGT: -64
sense_resistor: 0.075

[tmc5160 stepper_y]
cs_pin: PD11
spi_software_mosi_pin = PA7
spi_software_miso_pin = PA6
spi_software_sclk_pin = PA5
run_current: 2.24
interpolate: True
diag0_pin: !PG9
sense_resistor: 0.075

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_z]
uart_pin: PC6
run_current: 1.15
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4

[tmc2209 stepper_z1]
uart_pin: PC7
run_current: 1.15
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4

# COMMENTED OUT - extruder driver now on EBB42
#[tmc2209 extruder]
#uart_pin: PF2
#run_current: 0.850

[tmc2209 stepper_z2]
uart_pin: PE4
run_current: 1.15
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PC5

[display]
lcd_type: st7920
cs_pin: EXP1_7  
sclk_pin: EXP1_6
sid_pin: EXP1_8 
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2 

[output_pin beeper]
pin: EXP1_1

[safe_z_home]
home_xy_position: 135, 125
speed: 200
z_hop: 5
z_hop_speed: 5

# COMMENTED OUT - BLTouch replaced by Beacon
#[bltouch]
#sensor_pin: ^PB7
#control_pin: PB6
#z_offset: 2.791

########################################
# Beacon Probe
# Contactless eddy-current Z probe on VzBot CNC toolhead + Goliath short duct
########################################

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_080C96DB4E5737374D202020FF100F37-if00
x_offset: 0 
y_offset: 36        # Rev H offset for Tentacool/Goliath Short
mesh_main_direction: x
mesh_runs: 2

[bed_mesh]
speed: 300
horizontal_move_z: 6
mesh_min: 5, 36
mesh_max: 255, 240
probe_count: 10,10
algorithm: bicubic

# COMMENTED OUT - accelerometer now on EBB42
#[adxl345]
#cs_pin: PA15
#spi_bus: spi3

[resonance_tester]
accel_chip: beacon
probe_points: 130, 130, 20

[z_tilt]
z_positions:
    130, 245
    0, 0
    260, 0
points:
    130, 209
    10, 0
    250, 0
speed: 600
retries: 5
retry_tolerance: 0.01
horizontal_move_z: 10

[idle_timeout]
timeout: 3600

[output_pin relay]
pin: PE11
value: 1
pwm: False

[bed_mesh default]
[gcode_arcs]
[exclude_object]
[include mainsail.cfg]
[include led_marcos.cfg]
[include macros.cfg]
[include hotbox_macros.cfg]
[include moonraker_obico_macros.cfg]

[virtual_sdcard]
path: ~/printer_data/gcodes
[display_status]
[pause_resume]

[force_move]
enable_force_move: True

