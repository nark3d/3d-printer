# EBB36 GEN2 V1.0 Toolhead Configuration
# Serial connection defined in printer.cfg [mcu EBB36] section
# Pins sourced from BTT official sample config and Voron3D wiki

########################################
# Extruder
########################################

[extruder]
step_pin: EBB36:PB14
dir_pin: EBB36:PA8
enable_pin: !EBB36:PB6
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB36:PB4
sensor_pin: EBB36:PA3
sensor_type: PT1000
pullup_resistor: 2200
min_temp: 0
max_temp: 300
max_extrude_only_velocity: 60
max_extrude_only_distance: 500.0
pressure_advance_smooth_time: 0.01
# PID values need calibrating after first boot
control: pid
pid_kp: 15.688
pid_ki: 0.850
pid_kd: 72.362

[tmc2209 extruder]
uart_pin: EBB36:PB3
run_current: 0.850

########################################
# Fans
########################################

# Part cooling fan - FAN0
[fan]
pin: EBB36:PD3

# Hotend heatsink fan - FAN1
[heater_fan heatbreak_cooling_fan]
pin: EBB36:PA5
heater: extruder
heater_temp: 50.0

########################################
# Endstop
########################################

# X endstop on EBB36 - Filament/Endstop switch port
[stepper_x]
endstop_pin: ^!EBB36:PA15

########################################
# Temperature Sensors
########################################

[temperature_sensor EBB36_Driver]
sensor_type: Generic 3950
sensor_pin: EBB36:PA0
pullup_resistor: 2200
min_temp: 0
max_temp: 120

[temperature_sensor EBB36_MCU]
sensor_type: temperature_mcu
sensor_mcu: EBB36
min_temp: 0
max_temp: 110

